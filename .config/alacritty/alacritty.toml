# Config documentation: https://alacritty.org/config-alacritty.html

live_config_reload = true

import = [
  "~/.config/alacritty/themes/active_theme.toml",
]

[window]
# opacity = 0.95
opacity = 1
blur = true
padding = { y = 0, x = 0 }
dynamic_padding = true
decorations = "None"        # "Full" | "None" | "Transparent" | "Buttonless"
startup_mode = "Maximized"  # Options: Maximized | SimpleFullscreen | Windowed | Fullscreen

[font]
normal = { family = "JetBrainsMono Nerd Font", style = "Regular" }
bold = { family = "JetBrainsMono Nerd Font", style = "Bold" }
italic = { family = "JetBrainsMono Nerd Font", style = "Italic" }
bold_italic = { family = "JetBrainsMono Nerd Font", style = "Bold Italic" }
size = 15.5
offset = { x = 0, y = 1 }

[bell]
animation = "Linear"      # "Ease" | "EaseOut" | "EaseOutSine" | "EaseOutQuad" | "EaseOutCubic" | "EaseOutQuart" | "EaseOutQuint" | "EaseOutExpo" | "EaseOutCirc" | "Linear"
duration = 0
command = "None"

[selection]
save_to_clipboard = true

[keyboard]
bindings = [
  # Toggle fullscreen
  { key = "Return", mods = "Command", action = "ToggleSimpleFullscreen" },

  # Navigation - Move by word
  { key = "Left",  mods = "Alt", chars = "\u001BB" },  # Skip word left
  { key = "Right", mods = "Alt", chars = "\u001BF" },  # Skip word right

  # Home & End keys
  { key = "Left",  mods = "Command", chars = "\u001BOH", mode = "AppCursor" },  # Home
  { key = "Right", mods = "Command", chars = "\u001BOF", mode = "AppCursor" },  # End

  # Delete bindings
  { key = "Back", mods = "Command", chars = "\u0015" },      # Delete line
  { key = "Back", mods = "Alt", chars = "\u001B\u007F" },    # Delete word

  # Clear screen (Cmd + K)
  { key = "K", mods = "Command", chars = "clear" }
]
